<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orçamento Gustavo - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Notion Dark Theme Inspired */
            --bg: #191919;
            --surface: #202020;
            --surface-hover: #2c2c2c;
            --border: #373737;
            --text-main: #EBEBEB;
            --text-muted: #9B9B9B;
            
            /* Accents */
            --primary: #EC7000; /* Laranja Itaú */
            --emerald: #2EA043;
            --rose: #F85149;
            --badge-bg: #2d333b;
            --pago-bg: rgba(46, 160, 67, 0.15);
            --pago-text: #3fb950;
            --pend-bg: rgba(248, 81, 73, 0.15);
            --pend-text: #ff7b72;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            padding: 30px;
            min-height: 100vh;
        }

        /* HEADER */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        .header-title h1 { font-size: 22px; font-weight: 600; }
        .header-title span { color: var(--text-muted); font-size: 14px; }
        
        .month-controls { display: flex; align-items: center; gap: 15px; background: var(--surface); padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); }
        .month-controls button { background: none; border: none; color: var(--text-main); cursor: pointer; font-size: 16px; padding: 0 5px; transition: color 0.2s;}
        .month-controls button:hover { color: var(--primary); }
        .month-controls span { font-weight: 600; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; min-width: 100px; text-align: center; }

        /* DASHBOARD CARDS */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .kpi-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .kpi-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }
        .kpi-value { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 700; }
        .kpi-trend { font-size: 12px; display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 4px; width: fit-content; background: var(--badge-bg); }
        .trend-up { color: var(--rose); }
        .trend-down { color: var(--emerald); }

        /* MAIN CONTENT LAYOUT */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr; /* Entradas, Saídas, Recorrentes */
            gap: 24px;
        }

        /* PANELS (Tabelas) */
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 600px;
            overflow-y: auto;
        }
        
        /* Custom Scrollbar */
        .panel::-webkit-scrollbar { width: 6px; }
        .panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .panel-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .panel-title { font-size: 14px; font-weight: 600; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }

        /* LIST ITEMS */
        .list-item {
            display: grid;
            grid-template-columns: 1fr auto auto;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .list-item:last-child { border-bottom: none; }
        .item-name { font-size: 14px; font-weight: 500; }
        .item-val { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; }
        
        /* Tags & Buttons */
        .tag {
            font-size: 11px; font-weight: 600; padding: 4px 8px; border-radius: 4px; cursor: pointer; user-select: none;
            border: 1px solid transparent; transition: all 0.2s; text-transform: uppercase; text-align: center; min-width: 80px;
        }
        .tag-pago { background: var(--pago-bg); color: var(--pago-text); border-color: rgba(46, 160, 67, 0.3); }
        .tag-pend { background: var(--pend-bg); color: var(--pend-text); border-color: rgba(248, 81, 73, 0.3); }
        
        .btn-del { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; padding: 4px; }
        .btn-del:hover { color: var(--rose); }

        /* FORMS */
        .add-form {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            margin-top: auto;
            padding-top: 15px;
            border-top: 1px solid var(--border);
        }
        .add-form.full { grid-template-columns: 1fr; }
        input {
            background: var(--bg); border: 1px solid var(--border); color: var(--text-main);
            padding: 10px 12px; border-radius: 6px; font-family: inherit; font-size: 13px; outline: none;
        }
        input:focus { border-color: var(--primary); }
        
        button.btn-primary {
            background: var(--primary); color: #fff; border: none; padding: 10px 16px; border-radius: 6px;
            font-weight: 600; cursor: pointer; transition: opacity 0.2s; font-size: 13px;
        }
        button.btn-primary:hover { opacity: 0.8; }
        button.btn-secondary {
            background: var(--badge-bg); color: var(--text-main); border: 1px solid var(--border); padding: 8px; border-radius: 6px;
            font-size: 12px; cursor: pointer; margin-bottom: 10px; display: flex; justify-content: center; align-items: center; gap: 6px;
        }
        button.btn-secondary:hover { background: var(--border); }

        .empty-state { font-size: 12px; color: var(--text-muted); text-align: center; padding: 20px 0; font-style: italic; }

        @media (max-width: 1024px) {
            .main-grid { grid-template-columns: 1fr; }
            .panel { max-height: none; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-title">
            <h1>Orçamento Gustavo</h1>
            <span>Visão Consolidada</span>
        </div>
        <div class="month-controls">
            <button onclick="changeMonth(-1)">❮</button>
            <span id="month-label">MAI 2026</span>
            <button onclick="changeMonth(1)">❯</button>
        </div>
    </header>

    <div class="kpi-grid">
        <div class="kpi-card">
            <span class="kpi-label">Saldo do Mês</span>
            <span class="kpi-value" id="kpi-saldo">R$ 0,00</span>
        </div>
        <div class="kpi-card">
            <span class="kpi-label">Total de Receitas</span>
            <span class="kpi-value" id="kpi-receitas" style="color: var(--emerald)">R$ 0,00</span>
        </div>
        <div class="kpi-card">
            <span class="kpi-label">Total de Gastos</span>
            <span class="kpi-value" id="kpi-gastos" style="color: var(--rose)">R$ 0,00</span>
            <div id="kpi-trend" class="kpi-trend">--</div>
        </div>
    </div>

    <div class="main-grid">
        
        <div class="panel">
            <div class="panel-header">
                <span class="panel-title">↗ Todas as Entradas</span>
            </div>
            <div id="list-receitas"></div>
            
            <div class="add-form">
                <input type="text" id="desc-rec" placeholder="Ex: Salário, Rendimentos...">
                <input type="number" id="val-rec" placeholder="R$" style="width: 90px;" inputmode="decimal">
                <button class="btn-primary" style="grid-column: span 2;" onclick="add('receita')">Adicionar Receita</button>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                <span class="panel-title">↘ Todas as Despesas</span>
            </div>
            <div id="list-despesas"></div>
            
            <div class="add-form full" style="grid-template-columns: 2fr 1fr 1fr auto;">
                <input type="text" id="desc-desp" placeholder="Descrição da despesa">
                <input type="number" id="val-desp" placeholder="R$" inputmode="decimal">
                <button class="btn-primary" style="grid-column: span 2;" onclick="add('despesa')">Adicionar Despesa</button>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                <span class="panel-title">⚙️ Contas Recorrentes</span>
            </div>
            <p style="font-size: 11px; color: var(--text-muted); line-height: 1.4;">
                Defina aqui despesas fixas (Aluguel, Internet, etc). 
            </p>
            <button class="btn-secondary" onclick="importRecurring()">
                + Lançar Recorrentes neste mês
            </button>
            <div id="list-recorrentes" style="margin-top: 10px;"></div>
            
            <div class="add-form full">
                <input type="text" id="desc-recorr" placeholder="Nome (Ex: Aluguel)">
                <input type="number" id="val-recorr" placeholder="Valor Padrão R$" inputmode="decimal">
                <button class="btn-primary" onclick="addRecurring()">Salvar Recorrente</button>
            </div>
        </div>

    </div>

    <script>
        // Inicialização de Dados LocalStorage
        let state = {
            currentDate: new Date(),
            data: JSON.parse(localStorage.getItem('gustavo_notion_db')) || {},
            recorrentes: JSON.parse(localStorage.getItem('gustavo_recorrentes')) || []
        };

        const fmt = (val) => val.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        const getMonthKey = (d) => `${d.getFullYear()}-${d.getMonth()}`;

        function initMonth(key) {
            if (!state.data[key]) {
                state.data[key] = { receitas: [], despesas: [] };
            }
        }

        function render() {
            const key = getMonthKey(state.currentDate);
            initMonth(key);
            const monthData = state.data[key];

            // Render Labels
            const months = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
            document.getElementById('month-label').innerText = `${months[state.currentDate.getMonth()]} ${state.currentDate.getFullYear()}`;

            // Calculos KPI
            const totalRec = monthData.receitas.reduce((acc, curr) => acc + curr.val, 0);
            const totalDesp = monthData.despesas.reduce((acc, curr) => acc + curr.val, 0);
            const saldo = totalRec - totalDesp;

            document.getElementById('kpi-saldo').innerText = fmt(saldo);
            document.getElementById('kpi-saldo').style.color = saldo >= 0 ? 'var(--text-main)' : 'var(--rose)';
            document.getElementById('kpi-receitas').innerText = fmt(totalRec);
            document.getElementById('kpi-gastos').innerText = fmt(totalDesp);

            // Comparativo Mês Anterior
            let prevDate = new Date(state.currentDate);
            prevDate.setMonth(prevDate.getMonth() - 1);
            const prevKey = getMonthKey(prevDate);
            
            if (state.data[prevKey]) {
                const prevTotalDesp = state.data[prevKey].despesas.reduce((acc, curr) => acc + curr.val, 0);
                if (prevTotalDesp > 0) {
                    const diff = ((totalDesp - prevTotalDesp) / prevTotalDesp) * 100;
                    const trendEl = document.getElementById('kpi-trend');
                    if (diff > 0) {
                        trendEl.innerHTML = `▲ +${diff.toFixed(1).replace('.',',')}% vs mês anterior`;
                        trendEl.className = 'kpi-trend trend-up';
                    } else if (diff < 0) {
                        trendEl.innerHTML = `▼ ${diff.toFixed(1).replace('.',',')}% vs mês anterior`;
                        trendEl.className = 'kpi-trend trend-down';
                    } else {
                        trendEl.innerHTML = `Igual ao mês anterior`;
                        trendEl.className = 'kpi-trend';
                    }
                } else {
                    document.getElementById('kpi-trend').innerText = "--";
                }
            } else {
                document.getElementById('kpi-trend').innerText = "Sem dados anteriores";
                document.getElementById('kpi-trend').className = 'kpi-trend';
            }

            // Renderizar Listas
            renderList('receitas', monthData.receitas, 'list-receitas');
            renderList('despesas', monthData.despesas, 'list-despesas');
            
            // Renderizar Recorrentes
            const listRecorr = document.getElementById('list-recorrentes');
            listRecorr.innerHTML = state.recorrentes.length ? state.recorrentes.map((item, index) => `
                <div class="list-item">
                    <span class="item-name">${item.desc}</span>
                    <span class="item-val" style="color: var(--text-muted)">${fmt(item.val)}</span>
                    <button class="btn-del" onclick="deleteItem('recorrentes', ${index})">✕</button>
                </div>
            `).join('') : '<div class="empty-state">Sem contas recorrentes.</div>';
        }

        function renderList(type, array, elementId) {
            const container = document.getElementById(elementId);
            if(array.length === 0) {
                container.innerHTML = `<div class="empty-state">Nenhum registro encontrado.</div>`;
                return;
            }

            container.innerHTML = array.map((item, index) => `
                <div class="list-item">
                    <span class="item-name">${item.desc}</span>
                    <span class="item-val" style="color: ${type === 'receitas' ? 'var(--emerald)' : 'var(--text-main)'}">${fmt(item.val)}</span>
                    ${type === 'despesas' ? 
                        `<div class="tag ${item.pago ? 'tag-pago' : 'tag-pend'}" onclick="toggleStatus(${index})">
                            ${item.pago ? 'PAGO' : 'PENDENTE'}
                        </div>` : ''
                    }
                    <button class="btn-del" onclick="deleteItem('${type}', ${index})">✕</button>
                </div>
            `).join('');
        }

        // Ações CRUD
        function add(type) {
            const descInput = document.getElementById(type === 'receita' ? 'desc-rec' : 'desc-desp');
            const valInput = document.getElementById(type === 'receita' ? 'val-rec' : 'val-desp');
            const desc = descInput.value.trim();
            const val = parseFloat(valInput.value);

            if (!desc || isNaN(val)) return;

            const key = getMonthKey(state.currentDate);
            const newItem = { desc, val, id: Date.now() };
            
            if(type === 'despesa') newItem.pago = false;

            state.data[key][type === 'receita' ? 'receitas' : 'despesas'].push(newItem);
            
            descInput.value = ''; valInput.value = '';
            saveData();
        }

        function addRecurring() {
            const desc = document.getElementById('desc-recorr').value.trim();
            const val = parseFloat(document.getElementById('val-recorr').value);
            if (!desc || isNaN(val)) return;

            state.recorrentes.push({ desc, val, id: Date.now() });
            document.getElementById('desc-recorr').value = '';
            document.getElementById('val-recorr').value = '';
            saveData();
        }

        function importRecurring() {
            if(state.recorrentes.length === 0) return alert('Nenhuma conta recorrente cadastrada.');
            const key = getMonthKey(state.currentDate);
            
            state.recorrentes.forEach(rec => {
                // Verifica se já existe uma despesa com esse nome para não duplicar acidentalmente
                const exists = state.data[key].despesas.some(d => d.desc.toLowerCase() === rec.desc.toLowerCase());
                if(!exists) {
                    state.data[key].despesas.push({ desc: rec.desc, val: rec.val, pago: false, id: Date.now() + Math.random() });
                }
            });
            saveData();
        }

        function toggleStatus(index) {
            const key = getMonthKey(state.currentDate);
            state.data[key].despesas[index].pago = !state.data[key].despesas[index].pago;
            saveData();
        }

        function deleteItem(type, index) {
            if(type === 'recorrentes') {
                state.recorrentes.splice(index, 1);
            } else {
                const key = getMonthKey(state.currentDate);
                state.data[key][type].splice(index, 1);
            }
            saveData();
        }

        function changeMonth(dir) {
            state.currentDate.setMonth(state.currentDate.getMonth() + dir);
            render();
        }

        function saveData() {
            localStorage.setItem('gustavo_notion_db', JSON.stringify(state.data));
            localStorage.setItem('gustavo_recorrentes', JSON.stringify(state.recorrentes));
            render();
        }

        // Init
        render();

    </script>
</body>
</html>
