<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orçamento Gustavo - Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Palette Profissional - Dark Mode */
            --bg: #0c0d10;
            --surface: #16181d;
            --surface-hover: #1f2229;
            --primary: #ec7000; /* Identidade Itaú */
            --text: #f0f1f3;
            --text-dim: #949ba8;
            --emerald: #10b981;
            --rose: #f43f5e;
            --line: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; padding-bottom: 80px; }
        .app { max-width: 480px; margin: 0 auto; padding: 20px; }

        /* Header Minimalista */
        header { 
            padding: 30px 0 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 1px solid var(--line);
            margin-bottom: 25px;
        }
        .user-info h2 { font-size: 14px; color: var(--text-dim); font-weight: 400; }
        .user-info p { font-size: 18px; font-weight: 700; }

        .month-selector {
            display: flex; align-items: center; gap: 12px;
            background: var(--surface); padding: 8px 16px; border-radius: 20px; border: 1px solid var(--line);
        }
        .month-selector span { font-size: 12px; font-weight: 600; text-transform: uppercase; }

        /* Dashboard Hero */
        .balance-card { background: var(--surface); padding: 24px; border-radius: 24px; border: 1px solid var(--line); margin-bottom: 20px; }
        .balance-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
        .balance-value { font-size: 34px; font-weight: 700; font-family: 'JetBrains Mono', monospace; margin: 8px 0; }
        
        .mini-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .stat-item { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; }
        .stat-val { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 14px; }

        /* Lista de Transações - Estilo Moderno */
        .section-title { font-size: 12px; color: var(--text-dim); text-transform: uppercase; margin: 25px 0 15px; display: block; }
        .transaction-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px; background: var(--surface); border-radius: 16px; margin-bottom: 8px;
            transition: transform 0.1s;
        }
        .transaction-item:active { transform: scale(0.98); }
        .t-info { display: flex; align-items: center; gap: 12px; }
        .t-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .t-name { font-weight: 600; font-size: 14px; }
        .t-cat { font-size: 11px; color: var(--text-dim); }
        .t-amount { font-family: 'JetBrains Mono', monospace; font-weight: 600; }

        /* Aba Histórico - LIMPA E ORGANIZADA */
        .history-card {
            background: var(--surface); border-radius: 16px; padding: 16px; margin-bottom: 12px;
            display: grid; grid-template-columns: 1fr auto; align-items: center; border-left: 4px solid transparent;
        }
        .history-card.positive { border-left-color: var(--emerald); }
        .history-card.negative { border-left-color: var(--rose); }
        .hist-main { display: flex; flex-direction: column; }
        .hist-month { font-weight: 700; font-size: 15px; }
        .hist-details { font-size: 11px; color: var(--text-dim); display: flex; gap: 10px; }

        /* Navegação Inferior */
        nav.tab-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 70px;
            background: rgba(22, 24, 29, 0.95); backdrop-filter: blur(10px);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid var(--line); z-index: 1000;
        }
        .tab-btn { background: none; border: none; color: var(--text-dim); font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
        .tab-btn.active { color: var(--primary); }
        .tab-btn svg { width: 22px; height: 22px; margin-bottom: 2px; }

        .hidden { display: none; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 600; width: 100%; margin-top: 10px; }
        input, select { width: 100%; background: var(--surface); border: 1px solid var(--line); color: white; padding: 12px; border-radius: 12px; margin-bottom: 10px; outline: none; }
    </style>
</head>
<body>

<div class="app">
    <header>
        <div class="user-info">
            <h2>Gestão Financeira</h2>
            <p>Olá, Gustavo</p>
        </div>
        <div class="month-selector">
            <button onclick="changeMonth(-1)" style="background:none; border:none; color:white; cursor:pointer">❮</button>
            <span id="display-month">ABR 2026</span>
            <button onclick="changeMonth(1)" style="background:none; border:none; color:white; cursor:pointer">❯</button>
        </div>
    </header>

    <div id="tab-dash">
        <div class="balance-card">
            <span class="balance-label">Saldo Disponível</span>
            <div id="main-balance" class="balance-value">R$ 0,00</div>
            <div class="mini-stats">
                <div class="stat-item">
                    <span class="balance-label" style="font-size: 9px">Entradas</span>
                    <div id="total-in" class="stat-val" style="color: var(--emerald)">R$ 0,00</div>
                </div>
                <div class="stat-item">
                    <span class="balance-label" style="font-size: 9px">Saídas</span>
                    <div id="total-out" class="stat-val" style="color: var(--rose)">R$ 0,00</div>
                </div>
            </div>
        </div>

        <span class="section-title">Lançamentos Recentes</span>
        <div id="recent-list"></div>
    </div>

    <div id="tab-add" class="hidden">
        <span class="section-title">Novo Registro</span>
        <div class="balance-card">
            <input type="text" id="desc" placeholder="Descrição (ex: Supermercado)">
            <input type="number" id="val" placeholder="Valor R$" inputmode="decimal">
            <select id="type">
                <option value="in">Receita (Entrada)</option>
                <option value="out">Despesa (Saída)</option>
            </select>
            <button class="btn-add" onclick="saveTransaction()">Confirmar Lançamento</button>
        </div>
    </div>

    <div id="tab-history" class="hidden">
        <span class="section-title">Resumo por Mês</span>
        <div id="history-grid">
            </div>
    </div>
</div>

<nav class="tab-bar">
    <button class="tab-btn active" onclick="showTab('dash', this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
        Início
    </button>
    <button class="tab-btn" onclick="showTab('add', this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
        Lançar
    </button>
    <button class="tab-btn" onclick="showTab('history', this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
        Histórico
    </button>
</nav>

<script>
    let state = {
        date: new Date(),
        db: JSON.parse(localStorage.getItem('gustavo_fin_v2')) || {}
    };

    function save() {
        localStorage.setItem('gustavo_fin_v2', JSON.stringify(state.db));
        render();
    }

    function getMonthKey(date = state.date) {
        return `${date.getFullYear()}-${date.getMonth()}`;
    }

    function saveTransaction() {
        const desc = document.getElementById('desc').value;
        const val = parseFloat(document.getElementById('val').value);
        const type = document.getElementById('type').value;

        if(!desc || !val) return alert("Preencha todos os campos");

        const key = getMonthKey();
        if(!state.db[key]) state.db[key] = [];
        
        state.db[key].push({ desc, val, type, id: Date.now() });
        save();
        
        // Reset campos e volta pro dash
        document.getElementById('desc').value = '';
        document.getElementById('val').value = '';
        showTab('dash', document.querySelector('.tab-btn'));
    }

    function render() {
        const key = getMonthKey();
        const data = state.db[key] || [];
        
        const tin = data.filter(t => t.type === 'in').reduce((a, b) => a + b.val, 0);
        const tout = data.filter(t => t.type === 'out').reduce((a, b) => a + b.val, 0);
        const bal = tin - tout;

        document.getElementById('main-balance').innerText = `R$ ${bal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
        document.getElementById('total-in').innerText = `+ R$ ${tin.toLocaleString('pt-BR')}`;
        document.getElementById('total-out').innerText = `- R$ ${tout.toLocaleString('pt-BR')}`;

        // Lista do Mês
        document.getElementById('recent-list').innerHTML = data.map(t => `
            <div class="transaction-item">
                <div class="t-info">
                    <div class="t-icon" style="background: ${t.type === 'in' ? 'rgba(16,185,129,0.1)' : 'rgba(244,63,94,0.1)'}; color: ${t.type === 'in' ? 'var(--emerald)' : 'var(--rose)'}">
                        ${t.type === 'in' ? '↑' : '↓'}
                    </div>
                    <div>
                        <div class="t-name">${t.desc}</div>
                        <div class="t-cat">${t.type === 'in' ? 'Receita' : 'Despesa'}</div>
                    </div>
                </div>
                <div class="t-amount" style="color: ${t.type === 'in' ? 'var(--emerald)' : 'var(--text)'}">
                    ${t.type === 'in' ? '+' : '-'} R$ ${t.val.toLocaleString('pt-BR')}
                </div>
            </div>
        `).join('');

        renderHistory();
    }

    function renderHistory() {
        const historyGrid = document.getElementById('history-grid');
        const keys = Object.keys(state.db).sort().reverse();

        historyGrid.innerHTML = keys.map(k => {
            const items = state.db[k];
            const tin = items.filter(t => t.type === 'in').reduce((a, b) => a + b.val, 0);
            const tout = items.filter(t => t.type === 'out').reduce((a, b) => a + b.val, 0);
            const bal = tin - tout;
            const [y, m] = k.split('-');
            const dateName = new Date(y, m).toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });

            return `
                <div class="history-card ${bal >= 0 ? 'positive' : 'negative'}">
                    <div class="hist-main">
                        <span class="hist-month">${dateName.toUpperCase()}</span>
                        <div class="hist-details">
                            <span>In: R$ ${tin.toLocaleString('pt-BR')}</span>
                            <span>Out: R$ ${tout.toLocaleString('pt-BR')}</span>
                        </div>
                    </div>
                    <div class="t-amount" style="color: ${bal >= 0 ? 'var(--emerald)' : 'var(--rose)'}">
                        R$ ${bal.toLocaleString('pt-BR')}
                    </div>
                </div>
            `;
        }).join('') || '<p style="text-align:center; color:var(--text-dim); margin-top:20px;">Nenhum histórico encontrado.</p>';
    }

    function showTab(tab, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        ['dash', 'add', 'history'].forEach(t => document.getElementById(`tab-${t}`).classList.add('hidden'));
        document.getElementById(`tab-${tab}`).classList.remove('hidden');
    }

    function changeMonth(dir) {
        state.date.setMonth(state.date.getMonth() + dir);
        document.getElementById('display-month').innerText = state.date.toLocaleDateString('pt-BR', { month: 'short', year: 'numeric' }).toUpperCase();
        render();
    }

    render();
</script>

</body>
</html>
