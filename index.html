<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Orçamento Consolidado</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #191919;
            --surface: #202020;
            --border: #373737;
            --text-main: #EBEBEB;
            --text-muted: #9B9B9B;
            --primary: #EC7000; /* Laranja */
            --emerald: #2EA043;
            --rose: #F85149;
            --badge-bg: #2d333b;
            --pago-bg: rgba(46, 160, 67, 0.15);
            --pago-text: #3fb950;
            --pend-bg: rgba(248, 81, 73, 0.15);
            --pend-text: #ff7b72;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent; /* Remove piscar azul no clique no iOS */
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            /* Safe area para iOS (Notch e Barra inferior) */
            padding: env(safe-area-inset-top, 20px) env(safe-area-inset-right, 20px) env(safe-area-inset-bottom, 40px) env(safe-area-inset-left, 20px);
            min-height: 100vh;
            overscroll-behavior-y: none; /* Evita o "bounce" na tela inteira */
        }

        /* HEADER */
        header {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
            padding-top: 15px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }
        .header-title h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
        .header-title span { color: var(--text-muted); font-size: 14px; }
        
        .month-controls { 
            display: flex; align-items: center; justify-content: space-between; 
            background: var(--surface); padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border); 
        }
        .month-controls button { background: none; border: none; color: var(--text-main); cursor: pointer; font-size: 18px; padding: 5px 15px; }
        .month-controls span { font-weight: 600; font-size: 15px; text-transform: uppercase; letter-spacing: 1px; }

        /* DASHBOARD CARDS - Adaptado para Mobile */
        .kpi-grid {
            display: grid;
            grid-template-columns: 1fr; /* Empilha no mobile para leitura fácil */
            gap: 12px;
            margin-bottom: 25px;
        }
        .kpi-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px;
            display: flex; flex-direction: column; gap: 8px;
        }
        .kpi-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; }
        .kpi-value { font-family: 'JetBrains Mono', monospace; font-size: 32px; font-weight: 700; letter-spacing: -1px; }
        .kpi-trend { font-size: 12px; display: inline-flex; align-items: center; padding: 6px 10px; border-radius: 6px; width: fit-content; background: var(--badge-bg); font-weight: 500;}
        .trend-up { color: var(--rose); }
        .trend-down { color: var(--emerald); }

        /* MAIN CONTENT LAYOUT */
        .main-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 40px;
        }

        /* PANELS */
        .panel {
            background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px 15px;
            display: flex; flex-direction: column; gap: 15px;
        }

        .panel-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
        .panel-title { font-size: 16px; font-weight: 600; color: var(--text-main); }

        /* LIST ITEMS */
        .list-container {
            max-height: 40vh; /* Altura máxima em telas móveis */
            overflow-y: auto;
            -webkit-overflow-scrolling: touch; /* Inércia nativa do iOS */
        }
        .list-item {
            display: grid; grid-template-columns: 1fr auto auto; align-items: center; gap: 10px;
            padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .list-item:last-child { border-bottom: none; }
        .item-name { font-size: 15px; font-weight: 500; line-height: 1.3; }
        .item-val { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; }
        
        /* Tags & Buttons */
        .tag {
            font-size: 10px; font-weight: 700; padding: 6px 10px; border-radius: 6px; 
            text-transform: uppercase; text-align: center; min-width: 80px;
        }
        .tag-pago { background: var(--pago-bg); color: var(--pago-text); }
        .tag-pend { background: var(--pend-bg); color: var(--pend-text); }
        
        .btn-del { background: none; border: none; color: var(--text-muted); font-size: 18px; padding: 8px; margin-left: 5px; }

        /* FORMS - Ajustados para iOS */
        .add-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
            padding-top: 15px;
            border-top: 1px solid var(--border);
        }
        .input-row { display: flex; gap: 10px; }
        
        input {
            background: var(--bg); border: 1px solid var(--border); color: var(--text-main);
            padding: 14px 12px; border-radius: 10px; font-family: inherit; 
            font-size: 16px; /* 16px OBRIGATÓRIO PARA NÃO DAR ZOOM NO IOS */
            outline: none; width: 100%;
            -webkit-appearance: none; /* Remove estilos nativos feios do iOS */
        }
        input:focus { border-color: var(--primary); }
        
        button.btn-primary {
            background: var(--primary); color: #fff; border: none; padding: 16px; border-radius: 10px;
            font-weight: 600; font-size: 15px; width: 100%;
        }
        button.btn-primary:active { opacity: 0.8; transform: scale(0.98); } /* Feedback tátil visual */
        
        button.btn-secondary {
            background: var(--badge-bg); color: var(--text-main); border: 1px solid var(--border); 
            padding: 14px; border-radius: 10px; font-size: 14px; margin-bottom: 10px; font-weight: 500;
        }

        .empty-state { font-size: 14px; color: var(--text-muted); text-align: center; padding: 25px 0; }

        /* Desktop Ajustes Rápidos */
        @media (min-width: 768px) {
            header { flex-direction: row; }
            .kpi-grid { grid-template-columns: repeat(3, 1fr); }
            .main-grid { grid-template-columns: repeat(3, 1fr); flex-direction: row; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-title">
            <h1>Visão Consolidada</h1>
            <span>Seu controle financeiro</span>
        </div>
        <div class="month-controls">
            <button onclick="changeMonth(-1)">❮</button>
            <span id="month-label">MAI 2026</span>
            <button onclick="changeMonth(1)">❯</button>
        </div>
    </header>

    <div class="kpi-grid">
        <div class="kpi-card">
            <span class="kpi-label">Saldo do Mês</span>
            <span class="kpi-value" id="kpi-saldo">R$ 0,00</span>
        </div>
        <div class="kpi-card">
            <span class="kpi-label">Total de Gastos</span>
            <span class="kpi-value" id="kpi-gastos" style="color: var(--rose)">R$ 0,00</span>
            <div id="kpi-trend" class="kpi-trend">--</div>
        </div>
    </div>

    <div class="main-grid">
        <div class="panel">
            <div class="panel-header"><span class="panel-title">↗ Entradas</span></div>
            <div class="list-container" id="list-receitas"></div>
            <div class="add-form">
                <div class="input-row">
                    <input type="text" id="desc-rec" placeholder="Ex: Salário..." style="flex: 2;">
                    <input type="number" id="val-rec" placeholder="R$" style="flex: 1;" inputmode="decimal">
                </div>
                <button class="btn-primary" onclick="add('receita')">Adicionar Receita</button>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header"><span class="panel-title">↘ Despesas</span></div>
            <div class="list-container" id="list-despesas"></div>
            <div class="add-form">
                <div class="input-row">
                    <input type="text" id="desc-desp" placeholder="O que você comprou?" style="flex: 2;">
                    <input type="number" id="val-desp" placeholder="R$" style="flex: 1;" inputmode="decimal">
                </div>
                <button class="btn-primary" onclick="add('despesa')">Adicionar Despesa</button>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header"><span class="panel-title">⚙️ Contas Fixas</span></div>
            <button class="btn-secondary" onclick="importRecurring()">+ Lançar no mês atual</button>
            <div class="list-container" id="list-recorrentes" style="margin-top: 5px;"></div>
            <div class="add-form">
                <div class="input-row">
                    <input type="text" id="desc-recorr" placeholder="Ex: Aluguel..." style="flex: 2;">
                    <input type="number" id="val-recorr" placeholder="R$" style="flex: 1;" inputmode="decimal">
                </div>
                <button class="btn-primary" onclick="addRecurring()">Salvar Conta Fixa</button>
            </div>
        </div>
    </div>

    <script>
        let state = {
            currentDate: new Date(),
            data: JSON.parse(localStorage.getItem('fin_ios_db')) || {},
            recorrentes: JSON.parse(localStorage.getItem('fin_ios_rec')) || []
        };

        const fmt = (val) => val.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        const getMonthKey = (d) => `${d.getFullYear()}-${d.getMonth()}`;

        function initMonth(key) {
            if (!state.data[key]) state.data[key] = { receitas: [], despesas: [] };
        }

        function render() {
            const key = getMonthKey(state.currentDate);
            initMonth(key);
            const monthData = state.data[key];

            const months = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
            document.getElementById('month-label').innerText = `${months[state.currentDate.getMonth()]} ${state.currentDate.getFullYear()}`;

            const totalRec = monthData.receitas.reduce((acc, curr) => acc + curr.val, 0);
            const totalDesp = monthData.despesas.reduce((acc, curr) => acc + curr.val, 0);
            const saldo = totalRec - totalDesp;

            document.getElementById('kpi-saldo').innerText = fmt(saldo);
            document.getElementById('kpi-saldo').style.color = saldo >= 0 ? 'var(--emerald)' : 'var(--text-main)';
            document.getElementById('kpi-gastos').innerText = fmt(totalDesp);

            let prevDate = new Date(state.currentDate);
            prevDate.setMonth(prevDate.getMonth() - 1);
            const prevKey = getMonthKey(prevDate);
            
            if (state.data[prevKey]) {
                const prevTotalDesp = state.data[prevKey].despesas.reduce((acc, curr) => acc + curr.val, 0);
                if (prevTotalDesp > 0) {
                    const diff = ((totalDesp - prevTotalDesp) / prevTotalDesp) * 100;
                    const trendEl = document.getElementById('kpi-trend');
                    if (diff > 0) {
                        trendEl.innerHTML = `▲ +${diff.toFixed(1).replace('.',',')}% vs anterior`;
                        trendEl.className = 'kpi-trend trend-up';
                    } else if (diff < 0) {
                        trendEl.innerHTML = `▼ ${diff.toFixed(1).replace('.',',')}% vs anterior`;
                        trendEl.className = 'kpi-trend trend-down';
                    } else {
                        trendEl.innerHTML = `Igual ao mês anterior`;
                        trendEl.className = 'kpi-trend';
                    }
                } else {
                    document.getElementById('kpi-trend').innerText = "--";
                }
            } else {
                document.getElementById('kpi-trend').innerText = "Sem histórico";
                document.getElementById('kpi-trend').className = 'kpi-trend';
            }

            renderList('receitas', monthData.receitas, 'list-receitas');
            renderList('despesas', monthData.despesas, 'list-despesas');
            
            const listRecorr = document.getElementById('list-recorrentes');
            listRecorr.innerHTML = state.recorrentes.length ? state.recorrentes.map((item, index) => `
                <div class="list-item">
                    <span class="item-name">${item.desc}</span>
                    <span class="item-val" style="color: var(--text-muted)">${fmt(item.val)}</span>
                    <button class="btn-del" onclick="deleteItem('recorrentes', ${index})">✕</button>
                </div>
            `).join('') : '<div class="empty-state">Sem contas fixas cadastradas.</div>';
        }

        function renderList(type, array, elementId) {
            const container = document.getElementById(elementId);
            if(array.length === 0) {
                container.innerHTML = `<div class="empty-state">Lista vazia.</div>`;
                return;
            }
            container.innerHTML = array.map((item, index) => `
                <div class="list-item">
                    <span class="item-name">${item.desc}</span>
                    <div style="display:flex; align-items:center; gap: 8px;">
                        <span class="item-val" style="color: ${type === 'receitas' ? 'var(--emerald)' : 'var(--text-main)'}">${fmt(item.val)}</span>
                        ${type === 'despesas' ? 
                            `<div class="tag ${item.pago ? 'tag-pago' : 'tag-pend'}" onclick="toggleStatus(${index})">
                                ${item.pago ? 'PAGO' : 'PEND'}
                            </div>` : ''
                        }
                        <button class="btn-del" onclick="deleteItem('${type}', ${index})">✕</button>
                    </div>
                </div>
            `).join('');
        }

        function add(type) {
            const descInput = document.getElementById(type === 'receita' ? 'desc-rec' : 'desc-desp');
            const valInput = document.getElementById(type === 'receita' ? 'val-rec' : 'val-desp');
            const desc = descInput.value.trim();
            const val = parseFloat(valInput.value);

            if (!desc || isNaN(val)) return;

            const key = getMonthKey(state.currentDate);
            const newItem = { desc, val, id: Date.now() };
            if(type === 'despesa') newItem.pago = false;

            state.data[key][type === 'receita' ? 'receitas' : 'despesas'].push(newItem);
            descInput.value = ''; valInput.value = '';
            
            // Força o teclado a fechar no iOS após adicionar
            document.activeElement.blur();
            saveData();
        }

        function addRecurring() {
            const desc = document.getElementById('desc-recorr').value.trim();
            const val = parseFloat(document.getElementById('val-recorr').value);
            if (!desc || isNaN(val)) return;

            state.recorrentes.push({ desc, val, id: Date.now() });
            document.getElementById('desc-recorr').value = '';
            document.getElementById('val-recorr').value = '';
            document.activeElement.blur();
            saveData();
        }

        function importRecurring() {
            if(state.recorrentes.length === 0) return alert('Cadastre primeiro em Contas Fixas.');
            const key = getMonthKey(state.currentDate);
            
            state.recorrentes.forEach(rec => {
                const exists = state.data[key].despesas.some(d => d.desc.toLowerCase() === rec.desc.toLowerCase());
                if(!exists) state.data[key].despesas.push({ desc: rec.desc, val: rec.val, pago: false, id: Date.now() + Math.random() });
            });
            saveData();
        }

        function toggleStatus(index) {
            const key = getMonthKey(state.currentDate);
            state.data[key].despesas[index].pago = !state.data[key].despesas[index].pago;
            saveData();
        }

        function deleteItem(type, index) {
            if(type === 'recorrentes') state.recorrentes.splice(index, 1);
            else {
                const key = getMonthKey(state.currentDate);
                state.data[key][type].splice(index, 1);
            }
            saveData();
        }

        function changeMonth(dir) {
            state.currentDate.setMonth(state.currentDate.getMonth() + dir);
            render();
        }

        function saveData() {
            localStorage.setItem('fin_ios_db', JSON.stringify(state.data));
            localStorage.setItem('fin_ios_rec', JSON.stringify(state.recorrentes));
            render();
        }

        render();
    </script>
</body>
</html>
